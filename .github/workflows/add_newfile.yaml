name: Create File

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-file:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create file
        run: |
          date > report.txt

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add report.txt
          git commit -m "Update report"
          git push
